<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/svg+xml" sizes="any" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/icons/maskable_icon_x192.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf9" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0b0d" />
		<!-- Apply persisted theme BEFORE paint to avoid a flash of the wrong palette. -->
		<script>
			(function () {
				try {
					var l = localStorage.getItem('language') || 'en';
					if (l === 'en' || l === 'nb' || l === 'nn') document.documentElement.lang = l;
					var t = localStorage.getItem('theme') || 'worldcup';
					if (t === 'light' || t === 'dark' || t === 'worldcup')
						document.documentElement.setAttribute('data-theme', t);
				} catch (e) {}
			})();
		</script>
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="black-translucent"
		/>
		<meta name="apple-mobile-web-app-title" content="VM Tipping" />
		<title>VM Tipping</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
